name: tg-config-bot-prod

services:
#  TODO переписать под нужды бота
  bot:
    image: tg-config-bot
    build:
      context: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - postgres
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GERMAN_PANEL_HOME_URL: ${GERMAN_PANEL_HOME_URL}
      LATV_PANEL_HOME_URL: ${LATV_PANEL_HOME_URL}
      XUI_USERNAME: ${XUI_USERNAME}
      XUI_PASSWORD: ${XUI_PASSWORD}
      XUI_PASSWORD_LATV: ${XUI_PASSWORD_LATV}
      XUI_USERNAME_LATV: ${XUI_USERNAME_LATV}
      DB_LINK_PROD: ${DB_LINK_PROD}
      DB_LINK_DEV: ${DB_LINK_DEV}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ADMIN_CHATS: ${ADMIN_CHATS}
      LATV_XHTTP_INBOUND_PROD: ${LATV_XHTTP_INBOUND_PROD}
      LATV_XHTTP_INBOUND_DEV: ${LATV_XHTTP_INBOUND_DEV}
      LATV_XHTTP_PBK: ${LATV_XHTTP_PBK}
      LATV_XHTTP_SNI: ${LATV_XHTTP_SNI}
      LATV_XHTTP_SID: ${LATV_XHTTP_SID}
      GERM_SERVER_HOST: ${GERM_SERVER_HOST}
      GERM_WS_PORT: ${GERM_WS_PORT}
      GERM_XHTTP_PORT: ${GERM_XHTTP_PORT}
      GERM_SUB_BASE_URL: ${GERM_SUB_BASE_URL}
      GERM_XHTTP_PBK: ${GERM_XHTTP_PBK}
      GERM_XHTTP_SNI: ${GERM_XHTTP_SNI}
      GERM_XHTTP_SID: ${GERM_XHTTP_SID}
      GERM_XHTTP_FP: ${GERM_XHTTP_FP}
      GERM_XHTTP_PATH: ${GERM_XHTTP_PATH}
      GERM_XHTTP_HOST: ${GERM_XHTTP_HOST}
      GERM_XHTTP_SPX: ${GERM_XHTTP_SPX}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f java || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  db:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5491:5432"   # непопулярный хост-порт (5432/5433/5434 заняты другими БД)
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    networks:
      - postgres

volumes:
  pgdata:
  pgadmin-data:

networks:
  postgres:
    driver: bridge